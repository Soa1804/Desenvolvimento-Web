<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Far Cry 4</title>

<link rel="stylesheet" href="../style.css">

</head>

<body>

<div class="topo">
<div id="data"></div>
<div>Far Cry 4</div>
</div>

<div class="quadro">
<div class="galeria">

<img src="../Imagens/Imagens_Far_Cry_4/imagem1.jpg">
<img src="../Imagens/Imagens_Far_Cry_4/imagem2.jpg">
<img src="../Imagens/Imagens_Far_Cry_4/imagem3.jpg">
<img src="../Imagens/Imagens_Far_Cry_4/imagem4.jpg">

</div>
</div>

<script>

function atualizarData(){

let hoje = new Date();

let dia = hoje.getDate();
let mes = hoje.getMonth() + 1;
let ano = hoje.getFullYear();

document.getElementById("data").innerHTML =
"Data: " + dia + "/" + mes + "/" + ano;

}

atualizarData();

</script>

</body>
</html>
